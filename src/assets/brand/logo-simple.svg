<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bgGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 圆角方形背景 -->
  <rect x="4" y="4" width="192" height="192" rx="40" fill="url(#bgGrad2)"/>

  <!-- 岛屿 -->
  <ellipse cx="100" cy="125" rx="65" ry="28" fill="#2E86C1" opacity="0.6"/>
  <ellipse cx="100" cy="120" rx="55" ry="22" fill="#5DADE2" opacity="0.8"/>

  <!-- 简化知识树 -->
  <rect x="96" y="50" width="8" height="55" rx="4" fill="#8B6914"/>
  <ellipse cx="100" cy="48" rx="28" ry="24" fill="#27AE60"/>
  <ellipse cx="80" cy="55" rx="18" ry="14" fill="#2ECC71" transform="rotate(-20,80,55)"/>
  <ellipse cx="120" cy="55" rx="18" ry="14" fill="#2ECC71" transform="rotate(20,120,55)"/>

  <!-- 书本图标 -->
  <g transform="translate(135, 100)">
    <rect x="0" y="0" width="28" height="20" rx="2" fill="#F4D03F"/>
    <rect x="0" y="0" width="14" height="20" rx="2" fill="#F1C40F"/>
    <line x1="14" y1="0" x2="14" y2="20" stroke="#D4AC0D" stroke-width="1"/>
    <line x1="4" y1="6" x2="11" y2="6" stroke="#D4AC0D" stroke-width="0.8"/>
    <line x1="4" y1="10" x2="11" y2="10" stroke="#D4AC0D" stroke-width="0.8"/>
    <line x1="4" y1="14" x2="11" y2="14" stroke="#D4AC0D" stroke-width="0.8"/>
    <line x1="17" y1="6" x2="24" y2="6" stroke="#D4AC0D" stroke-width="0.8"/>
    <line x1="17" y1="10" x2="24" y2="10" stroke="#D4AC0D" stroke-width="0.8"/>
    <line x1="17" y1="14" x2="24" y2="14" stroke="#D4AC0D" stroke-width="0.8"/>
  </g>

  <!-- 星星 -->
  <text x="155" y="40" font-size="16" fill="#F1C40F">★</text>
  <text x="40" y="35" font-size="11" fill="#F1C40F" opacity="0.8">✦</text>
</svg>
