<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 120" width="400" height="120">
  <defs>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4A90D9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#357ABD;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 图标部分 -->
  <g transform="translate(10, 10)">
    <rect x="0" y="0" width="100" height="100" rx="22" fill="url(#textGrad)"/>
    <ellipse cx="50" cy="65" rx="32" ry="14" fill="#2E86C1" opacity="0.5"/>
    <ellipse cx="50" cy="62" rx="26" ry="11" fill="#5DADE2" opacity="0.7"/>
    <rect x="48" y="25" width="4" height="28" rx="2" fill="#8B6914"/>
    <ellipse cx="50" cy="24" rx="14" ry="12" fill="#27AE60"/>
    <ellipse cx="40" cy="28" rx="9" ry="7" fill="#2ECC71" transform="rotate(-20,40,28)"/>
    <ellipse cx="60" cy="28" rx="9" ry="7" fill="#2ECC71" transform="rotate(20,60,28)"/>
    <text x="75" y="20" font-size="10" fill="#F1C40F">★</text>
  </g>

  <!-- 文字部分 -->
  <text x="125" y="65" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" 
        font-size="40" font-weight="bold" fill="#4A90D9">乐学岛</text>
  <text x="125" y="90" font-family="'PingFang SC','Microsoft YaHei','Noto Sans SC',sans-serif" 
        font-size="14" fill="#999" letter-spacing="4">HAPPY LEARNING ISLAND</text>
</svg>
